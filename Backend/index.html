<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova | Data Intelligence Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body class="dark-mode"> 
    <nav class="navbar">
        <div class="logo">
            <h1>Nova</h1>
            <h3>Data Intelligence Dashboard</h3>
        </div>

        <div class="nav-actions">
        </div>
    </nav>
    <div class="search-container">
        <input type="text" id="search-input" placeholder="Search IP, Port, or Org (e.g., 80, Apache, Google)...">
        <button id="search-btn">Analyze</button>
    </div>

    <div class="filter-container">
        <select id="country-filter">
          <option value="">All Countries</option>
        </select>

        <select id="org-filter">
          <option value="">All Organizations</option>
        </select>

        <select id="port-filter">
          <option value="">All Ports</option>
        </select>
    </div>

    <main class="container">
        <div id="results-grid" class="results-grid">
            <div class="welcome-msg">
                <h1>Welcome to Nova</h1>
                <p>Enter a query above to explore real-time network intelligence.</p>
                <div class="examples">
                    <span>Try: <code>port:80</code></span>
                    <span>Try: <code>country:US</code></span>
                    <span>Try: <code>product:Apache</code></span>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
