<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NOVA - Meal Explorer</title>
    <link rel="stylesheet" href="./src/index.css" />
  </head>
  <body>
    <div id="app">
      <div class="layout">
        <header class="header">
          <div class="container header-content">
            <div class="brand-section">
              <div class="logo-container">
                <div class="logo">
                  <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 13.87A4 4 0 0 1 7.41 6a5.11 5.11 0 0 1 1.05-1.54 5 5 0 0 1 7.08 0A5.11 5.11 0 0 1 16.59 6 4 4 0 0 1 18 13.87V21H6Z"/><line x1="6" y1="17" x2="18" y2="17"/></svg>
                </div>
                <div class="brand-text">
                  <h1 class="title">NOVA - Meal Explorer</h1>
                  <p class="subtitle">Culinary Discovery</p>
                </div>
              </div>

              <div class="search-section">
                <div class="search-input-wrapper">
                  <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                  <input
                    id="search-input"
                    type="text"
                    placeholder="Search recipes..."
                    class="search-input"
                  />
                </div>
              </div>
            </div>

            <div id="categories-container" class="categories-nav">
  
            </div>
          </div>
        </header>

        <main class="container main-content">
          <div class="results-header">
            <h2 id="results-title" class="results-title">
              Beef Selection
            </h2>
            <button id="sort-button" class="btn-secondary">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 16 4 4 4-4"/><path d="M7 20V4"/><path d="m21 8-4-4-4 4"/><path d="M17 4v16"/></svg>
              <span id="sort-text">Sort A-Z</span>
            </button>
          </div>

          <div id="meals-grid" class="meals-grid">
            
          </div>
        </main>

        <footer class="footer">
          <div class="container footer-content">
            <div class="footer-brand">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 13.87A4 4 0 0 1 7.41 6a5.11 5.11 0 0 1 1.05-1.54 5 5 0 0 1 7.08 0A5.11 5.11 0 0 1 16.59 6 4 4 0 0 1 18 13.87V21H6Z"/><line x1="6" y1="17" x2="18" y2="17"/></svg>
              <span class="footer-title">Meal Explorer</span>
            </div>
            <p class="footer-text">Data provided by TheMealDB API</p>
          </div>
        </footer>

        <div id="modal-container"></div>
      </div>
    </div>
    <script src="./src/main.js"></script>
  </body>
</html>
